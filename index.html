<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso UCI</title>
  <style>
    :root{
      --slate-50:#f8fafc; --slate-100:#f1f5f9; --slate-200:#e2e8f0; --slate-300:#cbd5e1;
      --slate-400:#94a3b8; --slate-500:#64748b; --slate-600:#475569; --slate-700:#334155; --slate-800:#1e293b;
      --blue-50:#eff6ff; --blue-100:#dbeafe; --blue-500:#3b82f6; --blue-600:#2563eb; --blue-700:#1d4ed8; --blue-900:#1e3a8a;
      --purple-100:#f3e8ff; --purple-500:#a855f7; --purple-600:#9333ea; --purple-700:#7e22ce; --purple-900:#581c87;
      --red-50:#fef2f2; --red-100:#fee2e2; --red-500:#ef4444; --red-600:#dc2626; --red-700:#b91c1c;
      --emerald-100:#d1fae5; --emerald-500:#10b981; --emerald-700:#047857;
      --amber-100:#fef3c7; --amber-500:#f59e0b; --amber-700:#b45309;
      --indigo-100:#e0e7ff; --indigo-600:#4f46e5;
      --sky-100:#e0f2fe; --sky-600:#0284c7;
      --rose-100:#ffe4e6; --rose-600:#e11d48;
      --lime-100:#ecfccb; --lime-600:#65a30d;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      background-color:#f0f4f8;
      background-image:radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size:24px 24px;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--slate-700);
      min-height:100vh;
    }
    .hidden{display:none !important;}

    /* ---------- LOGIN ---------- */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
    .login-glass{
      background:rgba(255,255,255,0.7);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.5);
      padding:40px;border-radius:24px;max-width:360px;width:100%;text-align:center;
      box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
    }
    .login-badge{
      display:inline-flex;padding:16px;background:var(--blue-600);border-radius:16px;color:#fff;margin-bottom:24px;
      box-shadow:0 10px 25px -5px rgba(59,130,246,0.4);
    }
    .login-glass h1{font-size:24px;font-weight:900;color:var(--slate-800);margin:0 0 8px;}
    .login-glass p.sub{color:var(--slate-500);font-size:14px;margin:0 0 32px;font-weight:500;}
    .login-input{
      width:100%;padding:12px 20px;border-radius:12px;background:rgba(255,255,255,0.5);
      border:1px solid var(--slate-200);outline:none;font-weight:700;text-align:center;
      color:var(--slate-700);font-size:15px;transition:all .15s;
    }
    .login-input::placeholder{color:var(--slate-400);}
    .login-input:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(59,130,246,0.25);}
    .login-btn{
      width:100%;margin-top:16px;background:var(--blue-600);color:#fff;font-weight:700;
      padding:12px;border:none;border-radius:12px;cursor:pointer;font-size:15px;
      box-shadow:0 10px 20px -5px rgba(37,99,235,0.4);transition:all .12s;
    }
    .login-btn:hover{background:var(--blue-700);}
    .login-btn:active{transform:scale(0.96);}
    .login-error{margin-top:16px;color:var(--red-500);font-size:12px;font-weight:700;}

    /* ---------- DASHBOARD ---------- */
    .dash{min-height:100vh;padding:24px;max-width:1920px;margin:0 auto;}
    @media(min-width:768px){.dash{padding:40px;}}
    .header{
      margin-bottom:40px;display:flex;flex-direction:column;justify-content:space-between;
      align-items:flex-end;gap:16px;
    }
    @media(min-width:768px){.header{flex-direction:row;}}
    .header .titles{width:100%;}
    .header h1{font-size:44px;font-weight:900;color:var(--slate-800);letter-spacing:-0.03em;margin:0 0 8px;line-height:1;}
    .header h1 span{color:var(--blue-600);}
    .header .tagline{color:var(--slate-500);font-weight:500;margin:0;}
    .header .tools{display:flex;gap:16px;align-items:center;}
    .clock{
      background:#fff;padding:8px 16px;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,0.05);
      border:1px solid var(--slate-100);font-size:14px;font-weight:700;color:var(--slate-400);white-space:nowrap;
    }
    .logout-btn{
      background:var(--red-50);color:var(--red-600);padding:8px;border:none;border-radius:12px;
      cursor:pointer;transition:background .15s;display:flex;
    }
    .logout-btn:hover{background:var(--red-100);}

    .unit-block{margin-bottom:48px;}
    .unit-title{font-size:24px;font-weight:900;margin:0 0 24px;display:flex;align-items:center;gap:8px;}
    .unit-title.rea{color:var(--blue-900);}
    .unit-title.ucin{color:var(--purple-900);}
    .unit-bar{width:8px;height:32px;border-radius:9999px;display:inline-block;}
    .unit-bar.rea{background:var(--blue-500);}
    .unit-bar.ucin{background:var(--purple-500);}

    .grid{display:grid;grid-template-columns:1fr;gap:24px;}
    @media(min-width:640px){.grid{grid-template-columns:repeat(2,1fr);}}
    @media(min-width:1024px){.grid{grid-template-columns:repeat(3,1fr);}}
    @media(min-width:1280px){.grid{grid-template-columns:repeat(4,1fr);}}
    @media(min-width:1536px){.grid{grid-template-columns:repeat(5,1fr);}}

    /* ---------- BED CARD ---------- */
    .card{
      position:relative;background:linear-gradient(145deg,#ffffff,#f8fafc);
      border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,0.05);padding:20px;cursor:pointer;
      border:1px solid var(--slate-200);border-left-width:4px;transition:all .18s;
    }
    .card:hover{box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);transform:translateY(-4px);}
    .card.st-critico{border-left-color:var(--red-500);}
    .card.st-estable{border-left-color:var(--emerald-500);}
    .card.st-alerta{border-left-color:var(--amber-500);}

    .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .card-bed{display:flex;align-items:center;gap:12px;}
    .bed-ico{background:var(--slate-50);padding:8px;border-radius:8px;color:var(--slate-400);display:flex;}
    .card h3{font-size:20px;font-weight:900;color:var(--slate-800);line-height:1;margin:0;}
    .unit-badge{font-size:10px;font-weight:900;padding:1px 8px;border-radius:4px;text-transform:uppercase;display:inline-block;margin-top:2px;}
    .unit-badge.rea{background:var(--blue-100);color:var(--blue-700);}
    .unit-badge.ucin{background:var(--purple-100);color:var(--purple-700);}

    .status-badge{padding:4px 8px;border-radius:4px;font-size:12px;font-weight:700;text-transform:uppercase;}
    .status-badge.st-critico{background:var(--red-100);color:var(--red-700);}
    .status-badge.st-estable{background:var(--emerald-100);color:var(--emerald-700);}
    .status-badge.st-alerta{background:var(--amber-100);color:var(--amber-700);}

    .card-meta{
      display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--slate-500);
      margin-bottom:12px;background:var(--slate-50);padding:6px;border-radius:8px;border:1px solid var(--slate-100);
    }
    .card-meta .chip{display:flex;align-items:center;gap:4px;}
    .card-meta .divider{color:var(--slate-300);}
    .card-meta-empty{margin-bottom:12px;height:34px;}

    .card-label{font-size:12px;color:var(--slate-400);font-weight:700;text-transform:uppercase;margin:0;}
    .card-name{font-size:24px;font-weight:900;color:var(--slate-700);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* ---------- MODAL ---------- */
    .modal-backdrop{
      position:fixed;inset:0;background-color:rgba(15,23,42,0.8);backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;
    }
    .modal{
      background:var(--slate-50);width:100%;max-width:1152px;max-height:95vh;overflow-y:auto;
      border-radius:24px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.4);
    }
    .modal-head{
      background:#fff;padding:24px;border-bottom:1px solid var(--slate-100);display:flex;
      justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;
      box-shadow:0 1px 2px rgba(0,0,0,0.05);
    }
    .modal-head-left{display:flex;align-items:center;gap:16px;}
    .modal-bednum{
      height:56px;width:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:900;font-size:24px;box-shadow:0 4px 6px rgba(0,0,0,0.1);
    }
    .modal-bednum.rea{background:var(--blue-600);}
    .modal-bednum.ucin{background:var(--purple-600);}
    .modal-head h2{font-size:28px;font-weight:900;color:var(--slate-800);letter-spacing:-0.02em;margin:0;}
    .modal-head-meta{display:flex;align-items:center;gap:12px;color:var(--slate-500);font-weight:700;font-size:14px;margin-top:4px;}
    .modal-head-meta .pill{background:var(--slate-100);padding:1px 8px;border-radius:4px;color:var(--slate-600);}
    .modal-close{
      padding:10px 20px;background:var(--slate-100);border:none;border-radius:12px;font-weight:700;
      color:var(--slate-600);cursor:pointer;transition:background .15s;
    }
    .modal-close:hover{background:var(--slate-200);}
    .modal-body{padding:24px;display:flex;flex-direction:column;gap:24px;}
    @media(min-width:768px){.modal-body{padding:32px;}}

    .ap-box{background:rgba(241,245,249,0.8);padding:20px;border-radius:16px;border:1px solid var(--slate-200);}
    .ap-box h3{font-size:12px;font-weight:900;color:var(--slate-400);text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px;}
    .ap-box p{font-size:16px;font-weight:500;color:var(--slate-700);font-style:italic;margin:0;}

    .plan-wrap{padding:4px;border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,0.05);}
    .plan-wrap.rea{background:linear-gradient(to right,var(--blue-500),#60a5fa);}
    .plan-wrap.ucin{background:linear-gradient(to right,var(--purple-500),#c084fc);}
    .plan-inner{background:#fff;padding:20px;border-radius:12px;}
    .plan-head{display:flex;gap:8px;align-items:center;color:var(--slate-800);margin-bottom:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.02em;}
    .plan-inner p{font-size:18px;font-weight:500;padding-left:32px;line-height:1.6;color:var(--slate-800);margin:0;}

    .sys-grid{display:grid;grid-template-columns:1fr;gap:20px;}
    @media(min-width:768px){.sys-grid{grid-template-columns:repeat(3,1fr);}}
    .sys{background:rgba(255,255,255,0.8);padding:16px;border-radius:16px;border:1px solid var(--slate-100);box-shadow:0 1px 2px rgba(0,0,0,0.05);backdrop-filter:blur(4px);}
    .sys-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .sys-ico{padding:8px;border-radius:8px;display:flex;}
    .sys-ico.neuro{background:var(--indigo-100);color:var(--indigo-600);}
    .sys-ico.resp{background:var(--sky-100);color:var(--sky-600);}
    .sys-ico.hemo{background:var(--rose-100);color:var(--rose-600);}
    .sys-ico.renal{background:var(--amber-100);color:var(--amber-700);}
    .sys-ico.infec{background:var(--purple-100);color:var(--purple-600);}
    .sys-ico.diges{background:var(--lime-100);color:var(--lime-600);}
    .sys h4{font-size:12px;font-weight:700;color:var(--slate-500);text-transform:uppercase;margin:0;}
    .sys p{font-size:14px;font-weight:500;color:var(--slate-700);padding-left:40px;line-height:1.6;margin:0;}

    .pulse{animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

    ::-webkit-scrollbar{width:8px;}
    ::-webkit-scrollbar-thumb{background:var(--slate-400);border-radius:4px;}
  </style>
</head>

      Droplet:'<path d="M12 22a7 7 0 0 0 7-7c0-2-2-3-4-3l-3-3-3 3c-2 0-4 1-4 3a7 7 0 0 0 7 7z"/>',
      Thermometer:'<path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/>',
      Stomach:'<path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2Z"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>',
      Bed:'<path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/>',
      Alert:'<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
      Clipboard:'<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/>',
      User:'<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      Logout:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
      Lock:'<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>'
    };
    function icon(name, w){
      const size = w || 24;
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="'+size+'" height="'+size+'">'+(ICONS[name]||'')+'</svg>';
    }

    // ---------- UTILIDADES ----------
    function esc(s){
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function statusClass(estado){
      if(estado === 'Crítico') return 'st-critico';
      if(estado === 'Alerta')  return 'st-alerta';
      return 'st-estable';
    }
    const root = document.getElementById('root');

    // ---------- RENDER: LOGIN ----------
    function renderLogin(){
      root.innerHTML =
        '<div class="login-wrap"><div class="login-glass">'+
          '<div class="login-badge">'+icon('Lock',32)+'</div>'+
          '<h1>Acceso Restringido</h1>'+
          '<p class="sub">Dashboard Clínico UCI Quirúrgica</p>'+
          '<input id="pw" class="login-input" type="password" placeholder="Introduce la clave..." autofocus />'+
          '<button id="enter" class="login-btn">Entrar</button>'+
          '<p id="pwerror" class="login-error hidden">⛔ Clave incorrecta</p>'+
        '</div></div>';

      const pw = document.getElementById('pw');
      const err = document.getElementById('pwerror');
      function submit(){
        if(pw.value.toLowerCase() === PASSWORD_CORRECTA.toLowerCase()){
          try{ sessionStorage.setItem('uci_auth','true'); }catch(e){}
          renderDashboard();
        }else{
          err.classList.remove('hidden');
          pw.value = '';
          pw.focus();
        }
      }
      document.getElementById('enter').addEventListener('click', submit);
      pw.addEventListener('input', function(){ err.classList.add('hidden'); });
      pw.addEventListener('keydown', function(e){ if(e.key === 'Enter') submit(); });
      pw.focus();
    }

    // ---------- RENDER: TARJETA ----------
    function cardHTML(p){
      const sc = statusClass(p.estado);
      const unitLow = p.unidad === 'UCIN' ? 'ucin' : 'rea';
      const ocupada = p.paciente_id !== 'Cama Vacía';
      const meta = ocupada
        ? '<div class="card-meta"><span class="chip">'+icon('User',12)+' '+esc(p.edad)+' años</span><span class="divider">|</span><span>Día '+esc(p.dias_estancia)+'</span></div>'
        : '<div class="card-meta-empty"></div>';
      const alerta = p.alertas
        ? '<div style="margin-top:12px;display:flex;align-items:center;gap:8px;color:var(--red-600);background:var(--red-50);padding:4px 8px;border-radius:6px;"><span class="pulse" style="display:flex;">'+icon('Alert',16)+'</span><span style="font-size:12px;font-weight:700;">ATENCIÓN</span></div>'
        : '';
      return '<div class="card '+sc+'" data-id="'+esc(p.id)+'">'+
        '<div class="card-top">'+
          '<div class="card-bed"><div class="bed-ico">'+icon('Bed',24)+'</div>'+
            '<div><h3>Cama '+esc(p.numero_cama)+'</h3><span class="unit-badge '+unitLow+'">'+esc(p.unidad)+'</span></div></div>'+
          '<span class="status-badge '+sc+'">'+esc(p.estado)+'</span>'+
        '</div>'+
        meta+
        '<div><p class="card-label">Paciente</p><p class="card-name">'+esc(p.paciente_id)+'</p></div>'+
        alerta+
      '</div>';
    }

    // ---------- RENDER: DASHBOARD ----------
    function renderDashboard(){
      const reas  = PATIENTS.filter(function(p){ return p.unidad === 'REA'; });
      const ucins = PATIENTS.filter(function(p){ return p.unidad === 'UCIN'; });
      const hora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

      let html = '<div class="dash"><header class="header">'+
        '<div class="titles"><h1>UCI Quirúrgica <span>Dashboard</span></h1>'+
        '<p class="tagline">Vista clínica en tiempo real • REA + UCIN</p></div>'+
        '<div class="tools"><div class="clock">Act: '+esc(hora)+'</div>'+
        '<button id="logout" class="logout-btn" title="Cerrar sesión">'+icon('Logout',24)+'</button></div>'+
      '</header>';

      if(reas.length > 0){
        html += '<div class="unit-block"><h2 class="unit-title rea"><span class="unit-bar rea"></span>REA</h2>'+
          '<div class="grid">'+reas.map(cardHTML).join('')+'</div></div>';
      }
      if(ucins.length > 0){
        html += '<div class="unit-block"><h2 class="unit-title ucin"><span class="unit-bar ucin"></span>UCIN</h2>'+
          '<div class="grid">'+ucins.map(cardHTML).join('')+'</div></div>';
      }
      html += '</div>';
      root.innerHTML = html;

      document.getElementById('logout').addEventListener('click', function(){
        try{ sessionStorage.removeItem('uci_auth'); }catch(e){}
        renderLogin();
      });
      const cards = root.querySelectorAll('.card');
      for(let i=0;i<cards.length;i++){
        cards[i].addEventListener('click', function(){
          const id = this.getAttribute('data-id');
          const p = PATIENTS.find(function(x){ return x.id === id; });
          if(p) openModal(p);
        });
      }
    }

    // ---------- RENDER: MODAL ----------
    function sysHTML(cls, name, label, txt){
      return '<div class="sys"><div class="sys-head"><div class="sys-ico '+cls+'">'+icon(name,20)+'</div>'+
        '<h4>'+esc(label)+'</h4></div><p>'+(txt ? esc(txt) : 'Sin datos.')+'</p></div>';
    }
    function openModal(p){
      const unitLow = p.unidad === 'UCIN' ? 'ucin' : 'rea';
      const s = p.sistemas || {};
      const ap = (p.antecedentes && p.antecedentes !== '?')
        ? '<div class="ap-box"><h3>Antecedentes Personales (AP)</h3><p>'+esc(p.antecedentes)+'</p></div>'
        : '';
      const modal = document.createElement('div');
      modal.className = 'modal-backdrop';
      modal.innerHTML =
        '<div class="modal">'+
          '<div class="modal-head"><div class="modal-head-left">'+
            '<div class="modal-bednum '+unitLow+'">'+esc(p.numero_cama)+'</div>'+
            '<div><h2>'+esc(p.paciente_id)+'</h2><div class="modal-head-meta">'+
              '<span class="pill">'+esc(p.sexo)+'</span><span>'+esc(p.edad)+' años</span>'+
              '<span style="color:var(--slate-300);">•</span><span>Estancia: Día '+esc(p.dias_estancia)+'</span>'+
            '</div></div></div>'+
            '<button class="modal-close">Cerrar</button>'+
          '</div>'+
          '<div class="modal-body">'+
            ap+
            '<div class="plan-wrap '+unitLow+'"><div class="plan-inner">'+
              '<div class="plan-head">'+icon('Clipboard',24)+'<span>Plan Terapéutico</span></div>'+
              '<p>'+esc(p.plan)+'</p></div></div>'+
            '<div class="sys-grid">'+
              sysHTML('neuro','Brain','Neurológico',s.neurologico)+
              sysHTML('resp','Wind','Respiratorio',s.respiratorio)+
              sysHTML('hemo','Heart','Hemodinámico',s.hemodinamico)+
              sysHTML('renal','Droplet','Renal',s.renal)+
              sysHTML('infec','Thermometer','Infeccioso',s.infeccioso)+
              sysHTML('diges','Stomach','Digestivo',s.digestivo)+
            '</div>'+
          '</div>'+
        '</div>';
      function close(){ if(modal.parentNode) modal.parentNode.removeChild(modal); }
      modal.addEventListener('click', close);
      modal.querySelector('.modal').addEventListener('click', function(e){ e.stopPropagation(); });
      modal.querySelector('.modal-close').addEventListener('click', close);
      document.body.appendChild(modal);
    }

    // ---------- ARRANQUE ----------
    let logged = false;
    try{ logged = sessionStorage.getItem('uci_auth') === 'true'; }catch(e){}
    if(logged) renderDashboard(); else renderLogin();
  </script>
</body>
</html>
