/dl, Creatinina 0,58 mg/dl. Sodio 140 meq/l, Potasio 4 meq/l.","infeccioso":"Afebril. Leucocitos 18380/mm3, PCR 1,3 mg/dl. Sin tratamiento antibiótico.","digestivo":"Abdomen blando y depresible, peristaltismo audible. Glucemia alrededor de 100 mg/dl. Proteínas totales 6,5 g/dl. Se iniciará tolerancia dieta oral cuando esté informado el TAC. Coagulación convencional sin alteraciones salvo IQ 67%."}},{"id":"rea-5","numero_cama":"5","unidad":"REA","paciente_id":"Varón 56a - Ictus vertebrobasilar","estado":"Crítico","edad":"56","sexo":"H","dias_estancia":"1","antecedentes":"RAMc: niega. Hábitos tóxicos: bebedor habitual (1,5-2 botellas de vino/día, anis ocasional). DL. Depresión. Tratamiento habitual: Alprazolam, Escitalopram, Estatina.","plan":"Protocolo ictus isquémico tratado <24h. Pendiente informe de procedimiento. TC cerebral + angioTC TSA y PW para mañana 17/06. Inicia procedimiento de trombectomía mecánica bajo anestesia general.","sistemas":{"neurologico":"Paciente IOT, pupilas mióticas, exploración neurológica no valorable. Previamente estuporoso con respiración ruidosa, pausas prolongadas. Apertura ocular al dolor, obedece órdenes sencillas con insistencia. Exotropia bilateral, limitación aducción con nistagmo (WEBINO). Pupilas mióticas, isocóricas. PFC derecha. Hemiparesia izquierda. Infarto isquémico agudo/subagudo precoz en protuberancia izquierda. Oclusión/trombosis vertebrobasilar con arteria basilar filiforme/irregular. Post-trombectomía mecánica + stenting intracraneal con tirofibán iv.","respiratorio":"IOT, respiración ruidosa y abundantes secreciones.","hemodinamico":"No datos hemodinámicos actuales específicos. Ingresa en UCI a la espera de trombectomía.","renal":"No datos específicos.","infeccioso":"No datos específicos.","digestivo":"No datos específicos."}},{"id":"rea-6","numero_cama":"6","unidad":"REA","paciente_id":"Varón 63a - Post-doble bypass","estado":"Crítico","edad":"63","sexo":"H","dias_estancia":"2","antecedentes":"No RAMc. Fumador (5 cig/día desde hace 2 meses, previamente 20 cig/día desde los 20 años). DM tipo 2, DLP. Intervenido de reducción de estómago hace 4 años. Enfermedad de 3 vasos, mala función sistólica (FEVI severamente deprimida).","plan":"Reinicio de dobutamina para mejorar índice cardíaco y diuresis. Transfusión de 1 CH. Inicio de enoxaparina. Continuar destete de mórficos.","sistemas":{"neurologico":"Somnoliento. Orientado y colaborador, le cuesta realizar fisioterapia. RASS 0. GCS 14 puntos. Sin dolor. En tratamiento con perfusión de cl. mórfico (bajando a 0,5 ml/h).","respiratorio":"Extubado ayer tarde. Eupneico con cánulas nasales a 3 lpm. SatO2 100%. GSA: pH 7,31, pCO2 47. Murmullo vesicular conservado. Rx Tórax: borramiento base izquierda. Drenaje moderado por tubos torácicos (530 ml serohemático).","hemodinamico":"NA 10 ml/h + vasopresina a 1,25 ml/h. IC 3. IRVS 1570. TA 125/50 mmHg. FC 90/min en RS con extrasístoles ventriculares frecuentes. Troponina I 2317 pg/l (pico de 6300). AC: tonos rítmicos. Hgb 8,7 g/dl.","renal":"Diuresis justas que respondieron a furosemida. Urea 50 mg/dl, Creatinina 1,05 mg/dl. Iones en rango. (K: 4 meq/l).","infeccioso":"Afebril. Leucocitos 11000/mm3, PCR 11,8 mg/dl. Sin tratamiento antibiótico.","digestivo":"Abdomen blando y depresible, peristaltismo audible. Bilirrubina y enzimas hepáticas normales. Glucemias altas que precisaron insulina (ya parada). Proteínas totales 5,2 g/dl. Ya tolera líquidos y yogures. Coagulación con IQ 64%, INR 1,33. Inicia profilaxis con adiro + enoxaparina."}},{"id":"rea-7","numero_cama":"7","unidad":"REA","paciente_id":"Varón 50a - Post-esofaguectomía","estado":"Estable","edad":"50","sexo":"H","dias_estancia":"1","antecedentes":"No RAMc. No HTA, no DM. Hipercolesterolemia. SAOS con CPAP. Litiasis renales bilaterales. Protusiones discales. ADENOCARCINOMA DE UNION GastroEsofágica (uT3N1M0 MSS). Acondicionamiento de plastia gástrica con embolización arterial previa.","plan":"Sentar al sillón. Fisioterapia inspiratoria incentivada. Mantener amoxicilina-clavulánico 1g cada 8 horas. Iniciar NPT personalizada y retirar fluidos. Vigilar perfil hepático y amilasa. Revisar neumomediastino mañana.","sistemas":{"neurologico":"Consciente, orientado y colaborador, sin focalidad neurológica. GCS: 15 puntos. Manejo analgésico con catéter epidural con PC y analgesia de primer escalón. Refiere dolor abdominal que mejora tras bolo epidural. Bolos de morfina 2 mg iv SP.","respiratorio":"SatO2: 99% con GN 4 lpm. GSA: pH: 7,35, pCO2: 47, pO2: 78. Murmullo vesicular conservado. Rx Tórax: línea neumomediastino en silueta cardíaca. Tubo de tórax derecho con aspiración -20 cmH2O (150 ml de débito serohemático).","hemodinamico":"TA 110/55 mmHg. FC: 72/min, en RS. Sin aminas. AC: tonos rítmicos, sin soplos ni roces. Hgb: 12 g/dl.","renal":"Urea: 30 mg/dl, Creatinina: 0,80 mg/dl. Diuresis >0,5 ml/kg/h. Balance: -113 cc. Iones en rango. Sin tratamiento diurético. Sin edemas en zonas declives.","infeccioso":"Afebril ayer. Leucocitos: 7.340, PCR: 5,98 mg/dl. Mantenemos tratamiento con amoxicilina-clavulánico.","digestivo":"Abdomen blando y depresible, sin RHA. GOT: 39 UI/l, GPT: 19 UI/L Amilasa: 346. Tromboprofilaxis con enoxaparina 40mg."}},{"id":"rea-8","numero_cama":"8","unidad":"REA","paciente_id":"Varón 71a - Post-doble bypass (8º día)","estado":"Crítico","edad":"71","sexo":"H","dias_estancia":"8","antecedentes":"No RAMc. Exfumador. Seguimiento por urología por prostatitis bacteriana y HBP (3 biopsias prostáticas previas normales). Episodios previos de impactación alimentaria. Nódulo pulmonar estable.","plan":"Destete de noradrenalina. Optimización de tratamiento con bisoprolol (aumentar dosis tarde a 5mg y valorar) para intentar retirar landiolol. No retirar tubo C (persiste fuga). Mantener clexane profiláctico. Sentar a sillón. Macrogol suspendido temporalmente.","sistemas":{"neurologico":"Consciente y orientado, colaborador. Analgesia de primer escalón sin rescates. Refiere menos molestias con la tos. Sin focalidad neurológica.","respiratorio":"Eupneico GN a 3 lx. Sat.O2: 98%. GSA: pH: 7,39 pCO2: 37, pO2: 125. Murmullo vesicular conservado, roncus dispersos en hemitórax derecho. Rx tórax: similar a previas, derrame pleural izquierdo moderado.","hemodinamico":"TA: 110/51 (70) mmHg, con PC de noradrenalina a 14 ml/h. En FA con RVR (landiolol a 8 ml/h). En tratamiento con amiodarona + bisoprolol. Lactato 1,7. Ecocardioscopia: Buena contractilidad de visu, disminuida en septo y apicales de VI. VCI no colapsable. Hgb 8,9 g/dl.","renal":"Función renal conservada, estable. Diuresis 1152 ml. BH +225 ml. Necesidad de furosemida puntual. Ionograma en rango.","infeccioso":"Afebril. RFA en aumento. Leucos: 13040, PCR: 15,82 mg/dl. Sin tratamiento antibiótico.","digestivo":"Abdomen blando y depresible, no doloroso a la palpación. RHA +. Ayer realizó 4 deposiciones. Tolerancia oral completa. Hgb 8,9. Plaquetas: 285.000. Coagulación convencional normal, salvo TP alargado. AAS y HBPM dosis profilácticas. Perfil férrico bajo (Fe: 26), se administra 1 gr de ferinyect."}},{"id":"rea-10","numero_cama":"10","unidad":"REA","paciente_id":"Mujer 78a - Neumonitis química","estado":"Crítico","edad":"78","sexo":"M","dias_estancia":"18","antecedentes":"RAMc: Metamizol (angioedema), Olmesartán (rash), Tramadol (náuseas). HTA, Dislipemia. ERC por poliquistosis. HD en 2013, trasplante renal 2014 (injerto funcionante). Pendiente reparación eventración abdominal. Ingreso SARS-CoV2 + diarrea por C. difficille. Hipotiroidismo, osteoporosis, glaucoma.","plan":"Vigilar nivel de conciencia y otros síntomas neurológicos. Vigilancia de Na (guiar por AS, corrección máx. +8mmol/L/24h). Continuar con CPAP 7 FiO2 70% e intentar destete respiratorio. Seguimiento radiológico de infiltrados. Fisioterapia respiratoria incentivada. Mantener tubos de tórax. Pendiente informe de Ecocardiografía reglada. Transfusión de 1 CH y 1 pool de plaquetas. Se realiza Aspirado de Médula Ósea esternal. Tinzaparina suspendida, pendiente de reanudar cuando se resuelvan melenas. Continuar con balance hídrico negativo (-500) y disminuir edemas. Mantener pauta calcio 1UD/24h. Administrar 1500 mg de sulfato de Magnesio y 1 ampolla de Cloruro Cálcico. Advagraf 3mg/día en ayunas. IC hecha para canalización de PICC/MIDLINE. Realizar cultivos de vigilancia mañana. IC a endoscopias para valorar nueva gastroscopia +/- colonoscopia.","sistemas":{"neurologico":"Consciente y orientada, colaboradora. Miopatía leve. Sin dolor. Hiponatremia persistente pero estable (Na 130). Edemas en MMII y MMSS con fóvea. En tratamiento con furosemida.","respiratorio":"CPAP 7cmH2O (FiO2: 70%). Nebulizaciones de Budesonida y Atrovent. Sat. 93-95%. AP: mvc con hipoventilación bibasal y crepitantes dispersos. Eco pulmonar: derrame pleural bilateral y líneas B dispersas. GSA: pH 7,38, pCO2 45, pO2 72. Rx tórax 13/06: infiltrado alveolar difuso bilateral, empeoramiento, aumento DP izquierdo. TC Tórax: vidrio deslustrado, mejoría. Drenajes pig-tail drenaron 700 ml (derecho) y 500 ml (izquierdo) serohemático.","hemodinamico":"Hemodinámicamente estable sin soporte vasopresor ni inotrópico. TA 110/52 mmHg. FC 56 lpm en RS. Láctico 1,5. ProBNP 2400. Ecocardioscopia 13/06: contractilidad normal, IM. VD no colapsado. Tto: amlodipino, doxazosina, furosemida pc.","renal":"FRA en paciente trasplantada renal (función renal en meseta). Urea 126, Cr 1,51, FG 33. Na 130, K 3,8. Edema con fóvea. Hipocalcemia. Diuresis 2050 ml, BH -207. Tto: bicarbonato, metilprednisolona, micofenolato, tacrolimus, furosemida pc.","infeccioso":"Afebril. Leucocitos 7.300, PCR 6,14. Placa eritematosa MSD. Herida quirúrgica en pie derecho buen aspecto. Antibioterapia: Ceftarolina, Tedizolid. Cultivos previos: S. capitis, D. hominis, Klebsiella pneumoniae (BAS), S. lugdunensis MR (osteomielitis). Vías (CVC femoral derecha, Arteria pedia izquierda, VVP MII) sin signos de infección.","digestivo":"Varios episodios de melenas con anemización y plaquetopenia progresivas. Gastroscopia previa normal. Abdomen distendido y timpánico, no doloroso, sin signos de peritonismo. RHA presentes. Eventración abdominal no complicada. Molestias por gases. Dieta oral y buena tolerancia. Glucemia: 158. Proteínas totales 4,2. Perfil tiroideo compatible con síndrome eutiroideo enfermo (Eutirox suspendido). Coagulación en rango. Plaquetopenia progresiva."}},{"id":"rea-11","numero_cama":"11","unidad":"REA","paciente_id":"Mujer 78a - Laceración femoral post-TAVI","estado":"Estable","edad":"78","sexo":"M","dias_estancia":"1","antecedentes":"Anticoagulada en domicilio por FA.","plan":"Monitorizar función renal y balance hídrico. Apoyo diurético si oliguria persiste. Revaluar necesidad de profilaxis antitrombótica.","sistemas":{"neurologico":"Consciente, orientada y colaboradora, sin focalidad neurológica. RASS 0. GCS 15 puntos.","respiratorio":"Eupneica con cánulas nasales a 3 lpm. SatO2 99%. GSA: pH 7,33, pCO2 39, pO2 103. Murmullo vesicular conservado. Rx Tórax: cardiomegalia, sin derrames ni infiltrados.","hemodinamico":"Estable sin necesidad de aminas. TA 110/60 mmHg. FC 60/min en RS (estaba en FA en domicilio). AC: tonos rítmicos. Hgb 11,7 g/dl (transfundidos 2 CH).","renal":"Buenas diuresis con función renal normal. Urea 42 mg/dl, Creatinina 1,01 mg/dl. Iones en rango. Tendencia a la oliguria, precisa apoyo diurético.","infeccioso":"Afebril. Leucocitos 12900/mm3, PCR 6,7 mg/dl. En tratamiento cefazolina.","digestivo":"Abdomen blando y depresible, peristaltismo audible. Bilirrubina total 2,03 mg/dl con enzimas hepáticas normales. Glucemia alrededor de 160 mg/dl. Proteínas totales 5,2 g/dl. Coagulación con IQ 54%, INR 1,63. No lleva profilaxis antitrombótica."}},{"id":"rea-12","numero_cama":"12","unidad":"REA","paciente_id":"Varón 71a - Post-Bono-Bentall","estado":"Crítico","edad":"71","sexo":"H","dias_estancia":"1","antecedentes":"No RAM. Exfumador. HTA. Hipertrofia benigna de próstata pendiente de IQ. Portador de sonda urinaria permanente. FA crónica. IQ: Resección de ca. epidermoide, Hernia inguinal izda. recidivante.","plan":"Continuar soporte hemodinámico (noradrenalina, dobutamina, vasopresina) y ventilatorio (ventilación mecánica SIMV). Monitorizar función cardiaca y renal (creatinina elevada, acidosis láctica). Control estricto de constantes.","sistemas":{"neurologico":"Bajo anestesia general combinada con epidural. IOT sin incidencias. No valoración neurológica activa en este momento.","respiratorio":"Se mantiene en ventilación mecánica SIMV, FR: 18/min, Vt: 600 cc, FIO2: 50%, PEEP: 6 cmH2O.","hemodinamico":"Tendencia a la hipotensión, obliga a aumentar noradrenalina hasta 20 ml/h, dobutamina a 8 ml/h, y vasopresina a 1,5 ml/h. FA lenta pre-IQ, salida de CEC en ritmo de MCP en VVI a 80 lpm con dopamina. Cifras de troponina I hasta 40.000 pg/ml. Ácido láctico hasta 3,5 mmol/l.","renal":"Creatinina 1,5 mg/dl.","infeccioso":"No datos específicos de infección en este momento.","digestivo":"No datos específicos de sistema digestivo."}},{"id":"ucin-1","numero_cama":"1","unidad":"UCIN","paciente_id":"Mujer 59a - Post-LSD por VATS","estado":"Estable","edad":"59","sexo":"M","dias_estancia":"1","antecedentes":"No RAMc. No FRCV. Exfumadora. Proteinuria. Ca. lóbulo superior derecho (Adenocarcinoma G3 cT4N1M0 PDL1 0%). QT-IT neoadyuvante. Apendicetomizada. Trabajó en tipografía (posible inhalación tóxicos).","plan":"Continuar analgesia postoperatoria (fentanilo, naproxeno, ropivacaína epidural). Monitorización post-quirúrgica torácica.","sistemas":{"neurologico":"Consciente, orientada y colaboradora. Catéter epidural en T5-T. Extubación en Quirófano sin incidencias.","respiratorio":"SatO2 98% respirando aire ambiente pre-IQ. Buena tolerancia a la ventilación unilateral. Extubación sin incidencias.","hemodinamico":"TA: 135/60mmHg. FC: 65lpm. Estable durante la intervención. Sin incidencias. Hgb no especificado.","renal":"Diuresis conservada 0,5-1 ml/kg/h durante IQ.","infeccioso":"Profilaxis ATB no especificada, pero común en IQ.","digestivo":"No datos específicos de sistema digestivo, se asume normalidad."}},{"id":"ucin-5","numero_cama":"5","unidad":"UCIN","paciente_id":"Paciente 37a - Embolización Meningioma","estado":"Estable","edad":"37","sexo":"?","dias_estancia":"1","antecedentes":"Gran meningioma parafalciano parieto-occipital derecho.","plan":"Post-embolización prequirúrgica de meningioma. Continuar seguimiento y preparación para cirugía definitiva. Monitorización de complicaciones diferidas.","sistemas":{"neurologico":"Se realiza arteriografía diagnóstica y embolización prequirúrgica con onyx y glue desde arterias occipital, AMM derechas y AMM izquierda. No se producen complicaciones inmediatas.","respiratorio":"No datos específicos.","hemodinamico":"No datos específicos.","renal":"No datos específicos.","infeccioso":"No datos específicos.","digestivo":"No datos específicos."}},{"id":"ucin-6","numero_cama":"6","unidad":"UCIN","paciente_id":"Varón 60a - Pseudoaneurisma femoral","estado":"Crítico","edad":"60","sexo":"H","dias_estancia":"1","antecedentes":"Fumador (exfumador reciente). DLP. HDA autolimitada. Hernia inguinal izquierda. Síndrome de Leriche (By-pass Ao bifemoral). Historial de ingreso prolongado en REANIMACIÓN (17 días) por postoperatorio tórpido de Explante e implante de endoprótesis aórtica, reintervenciones por trombosis, sangrado, perforación duodenal, isquemia intestinal (sigmoidectomía con colostomía), laceración uréter renal (doble J). Diagnóstico actual: Pseudoaneurisma infeccioso femoral izquierdo. IQx: ligadura arteria femoral común y bypass con injerto de pericardio.","plan":"Iniciar tratamiento antihipertensivo habitual de planta (bisoprolol, amlodipino, doxazosina condicional). Iniciar profilaxis antitrombótica con enoxaparina 60mg/24h (pendiente anticoagulación dosis plenas). Continuar incentivación inspiratoria, añadir ipratropio. Suspender fluidoterapia y reponer iones. Reiniciar dieta oral en consenso con Cirugía General. Cuidados de colostomía (explicación a enfermera de colostomías). Analítica ordinaria para perfil nutricional mañana. Recomiendan reprogramar reintervención de manera diferida.","sistemas":{"neurologico":"Consciente y orientado, tranquilo y colaborador. Visitado por Psiquiatra, en tratamiento con Clonazepam, Mirtazapina y Haloperidol condicional. De momento no sedestación.","respiratorio":"Eupneico con GN a 2Lx' (SatO2 >95%), intercambio gaseoso algo justo. Roncus dispersos de predominio derecho. En tratamiento con Mucofluid y añadido ipratropio. GSA: pH 7,42, pCO2 43, pO2 68. Realiza fisioterapia respiratoria. Rx tórax al ingreso: sin hallazgos clínicos relevantes.","hemodinamico":"Estable con tendencia a la hipertensión arterial y taquicardia sinusal. Clevidipino a dosis bajas, se inicia bisoprolol 2,5mg y amlodipino, doxazosina condicional. Buena perfusión distal, pulso pedio izquierdo muy débil. Lácticos 1,2. Hgb de 9,7gr/dl.","renal":"Primeras horas de ingreso con poliuria (1150ml en 7h), sin diuréticos. Función renal conservada. Urea 12, Cr 0,5, FG >90. K 3,3 (reponiendo). Orina clara (previamente colúrica). Catéter Doble J.","infeccioso":"Leucocitos 20800, PCR 17,11, PCT 0,03. En tratamiento con dapto+ampicilina+levofloxacino. Historial de múltiples infecciones (prótesis aortobifemoral por S. anginosus, E. faecium, E. faecalis; neumonía nosocomial por Klebsiella pneumoniae NDM, Stenotrophomonas maltophilia; perforación intestinal, Cándida albicans).","digestivo":"En ayunas por la intervención. Previamente buena tolerancia a dieta blanda con poco apetito, en suplementación con batidos hiperproteicos. Glucemias bien controladas. Colostomía funcionante. Colestasis disociada leve. Hipoproteinemia PT 5,6. Abdomen blando y depresible. TAC abdomuno-pélvico: pseudoaneurisma femoral izquierdo, seroma inguinal derecho, colitis/ileocolitis isquémica en resolución. Disminución de colecciones periaórtica y paracólica izquierdas."}}];
    const PASSWORD_CORRECTA = "misbalare2720";

    // --- COMPONENTE DE LOGIN ---
    const LoginScreen = ({ onLogin }) => {
      const [input, setInput] = useState("");
      const [error, setError] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (input === PASSWORD_CORRECTA) {
          onLogin();
        } else {
          setError(true);
          setInput("");
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="login-glass p-10 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <div className="mb-6 inline-flex p-4 bg-blue-600 rounded-2xl text-white shadow-lg shadow-blue-500/30">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h1 className="text-2xl font-black text-slate-800 mb-2">Acceso Restringido</h1>
            <p className="text-slate-500 text-sm mb-8 font-medium">Dashboard Clínico UCI Quirúrgica</p>
            
            <form onSubmit={handleSubmit} className="space-y-4">
              <input 
                type="password" 
                value={input}
                onChange={(e) => {setInput(e.target.value); setError(false);}}
                placeholder="Introduce la clave..."
                className="w-full px-5 py-3 rounded-xl bg-white/50 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all font-bold text-center text-slate-700 placeholder-slate-400"
                autoFocus
              />
              <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-600/30 transition-all active:scale-95">
                Entrar
              </button>
            </form>
            {error && <p className="mt-4 text-red-500 text-xs font-bold animate-pulse">⛔ Clave incorrecta</p>}
          </div>
        </div>
      );
    };

    // --- ICONOS ---
    const Icons = {
      Brain: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
      Wind: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>,
      Heart: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
      Droplet: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22a7 7 0 0 0 7-7c0-2-2-3-4-3l-3-3-3 3c-2 0-4 1-4 3a7 7 0 0 0 7 7z"/></svg>,
      Thermometer: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>,
      Stomach: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2Z"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>,
      Bed: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>,
      Alert: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
      Clipboard: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/></svg>,
      User: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      Logout: (p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    };
    const Icon = ({n, c}) => { const I = Icons[n]; return I ? <I className={c} /> : null; };

    // --- COMPONENTES UI DASHBOARD ---
    const BedCard = ({ data, onClick }) => {
      const isUCIN = data.unidad === 'UCIN';
      const colors = { 'Crítico': 'border-l-red-500 bg-red-100 text-red-700', 'Estable': 'border-l-emerald-500 bg-emerald-100 text-emerald-700', 'Alerta': 'border-l-amber-500 bg-amber-100 text-amber-700' };
      const status = colors[data.estado] || colors['Alerta'];
      const unitClass = isUCIN ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700';
      return (
        <div onClick={() => onClick(data)} className={`relative glass-card rounded-xl shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all p-5 cursor-pointer border border-slate-200 border-l-4 ${status.split(' ')[0]}`}>
          <div className="flex justify-between items-start mb-2">
             <div className="flex items-center gap-3">
               <div className="bg-slate-50 p-2 rounded-lg text-slate-400"><Icon n="Bed" c="w-6 h-6"/></div>
               <div><h3 className="text-xl font-black text-slate-800 leading-none">Cama {data.numero_cama}</h3><span className={`text-[10px] font-black px-2 py-0.5 rounded uppercase ${unitClass}`}>{data.unidad}</span></div>
             </div>
             <span className={`px-2 py-1 rounded text-xs font-bold uppercase ${status.substring(status.indexOf(' ')+1)}`}>{data.estado}</span>
          </div>
          <div className="flex items-center gap-2 text-xs font-bold text-slate-500 mb-3 bg-slate-50 p-1.5 rounded-lg border border-slate-100">
             <span className="flex items-center gap-1"><Icon n="User" c="w-3 h-3"/> {data.edad} años</span><span className="text-slate-300">|</span><span>Día {data.dias_estancia}</span>
          </div>
          <div><p className="text-xs text-slate-400 font-bold uppercase">Paciente</p><p className="text-2xl font-black text-slate-700 truncate">{data.paciente_id || 'Cama ' + data.numero_cama}</p></div>
          {data.alertas && <div className="mt-3 flex items-center gap-2 text-red-600 bg-red-50 px-2 py-1 rounded"><Icon n="Alert" c="w-4 h-4 animate-pulse"/><span className="text-xs font-bold">ATENCIÓN</span></div>}
        </div>
      );
    };

    const Section = ({ i, t, txt, col }) => (
      <div className="bg-white/80 p-4 rounded-2xl border border-slate-100 shadow-sm backdrop-blur-sm">
        <div className="flex items-center gap-2 mb-2"><div className={`p-2 rounded-lg ${col}`}><Icon n={i} c="w-5 h-5"/></div><h4 className="text-xs font-bold text-slate-500 uppercase">{t}</h4></div>
        <p className="text-sm font-medium text-slate-700 pl-10 leading-relaxed">{txt || "Sin datos."}</p>
      </div>
    );

    const Modal = ({ p, onClose }) => {
      if(!p) return null;
      const isUCIN = p.unidad === 'UCIN';
      const headCol = isUCIN ? 'bg-purple-600' : 'bg-blue-600';
      return (
        <div className="fixed inset-0 modal-backdrop flex items-center justify-center p-4 z-50" onClick={onClose}>
          <div className="bg-slate-50 w-full max-w-6xl max-h-[95vh] overflow-y-auto rounded-3xl shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="bg-white p-6 border-b border-slate-100 flex justify-between items-center sticky top-0 z-10 shadow-sm">
               <div className="flex items-center gap-4">
                 <div className={`h-14 w-14 ${headCol} rounded-xl flex items-center justify-center text-white font-black text-2xl shadow-md`}>{p.numero_cama}</div>
                 <div>
                    <h2 className="text-3xl font-black text-slate-800 tracking-tight">{p.paciente_id || 'Cama ' + p.numero_cama}</h2>
                    <div className="flex items-center gap-3 text-slate-500 font-bold text-sm mt-1">
                        <span className="bg-slate-100 px-2 py-0.5 rounded text-slate-600">{p.sexo}</span>
                        <span>{p.edad} años</span><span className="text-slate-300">•</span><span>Estancia: Día {p.dias_estancia}</span>
                    </div>
                 </div>
               </div>
               <button onClick={onClose} className="px-5 py-2.5 bg-slate-100 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-colors">Esc Cerrar</button>
            </div>
            <div className="p-6 md:p-8 space-y-6">
               {p.antecedentes && p.antecedentes !== "?" && <div className="bg-slate-100/80 p-5 rounded-2xl border border-slate-200"><h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Antecedentes Personales (AP)</h3><p className="text-base font-medium text-slate-700 italic">{p.antecedentes}</p></div>}
               <div className={`p-1 rounded-2xl shadow-sm bg-gradient-to-r ${isUCIN ? 'from-purple-500 to-purple-400' : 'from-blue-500 to-blue-400'}`}><div className="bg-white p-5 rounded-xl"><div className="flex gap-2 mb-2 items-center text-slate-800"><Icon n="Clipboard" c="w-6 h-6"/><span className="font-black uppercase tracking-wide">Plan Terapéutico</span></div><p className="text-lg font-medium pl-8 leading-relaxed text-slate-800">{p.plan}</p></div></div>
               <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                 <Section i="Brain" t="Neurológico" txt={p.sistemas?.neurologico} col="bg-indigo-100 text-indigo-600"/>
                 <Section i="Wind" t="Respiratorio" txt={p.sistemas?.respiratorio} col="bg-sky-100 text-sky-600"/>
                 <Section i="Heart" t="Hemodinámico" txt={p.sistemas?.hemodinamico} col="bg-rose-100 text-rose-600"/>
                 <Section i="Droplet" t="Renal" txt={p.sistemas?.renal} col="bg-amber-100 text-amber-600"/>
                 <Section i="Thermometer" t="Infeccioso" txt={p.sistemas?.infeccioso} col="bg-purple-100 text-purple-600"/>
                 <Section i="Stomach" t="Digestivo" txt={p.sistemas?.digestivo} col="bg-lime-100 text-lime-600"/>
               </div>
            </div>
          </div>
        </div>
      );
    };

    // --- COMPONENTE PRINCIPAL (GESTIÓN DE SESIÓN) ---
    const App = () => {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [sel, setSel] = useState(null);

      useEffect(() => {
        const session = sessionStorage.getItem("uci_auth");
        if (session === "true") setIsLoggedIn(true);
      }, []);

      const handleLoginSuccess = () => {
        setIsLoggedIn(true);
        sessionStorage.setItem("uci_auth", "true");
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setSel(null);
        sessionStorage.removeItem("uci_auth");
      };

      if (!isLoggedIn) {
        return <LoginScreen onLogin={handleLoginSuccess} />;
      }

      const reas = PATIENTS.filter(p=>p.unidad==='REA');
      const ucins = PATIENTS.filter(p=>p.unidad==='UCIN');

      return (
        <div className="min-h-screen p-6 md:p-10 max-w-[1920px] mx-auto">
           <header className="mb-10 flex flex-col md:flex-row justify-between items-end gap-4">
              <div><h1 className="text-5xl font-black text-slate-800 tracking-tighter mb-2">UCI Quirúrgica <span className="text-blue-600">Dashboard</span></h1><p className="text-slate-500 font-medium">Vista clínica en tiempo real • REA + UCIN</p></div>
              <div className="flex gap-4 items-center">
                <div className="bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-100 text-sm font-bold text-slate-400">Act: {new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                <button onClick={handleLogout} className="bg-red-50 hover:bg-red-100 text-red-600 p-2 rounded-xl transition-colors" title="Cerrar sesión"><Icon n="Logout" c="w-6 h-6"/></button>
              </div>
           </header>
           {reas.length>0 && <div className="mb-12"><h2 className="text-2xl font-black text-blue-900 mb-6 flex items-center gap-2"><span className="w-2 h-8 bg-blue-500 rounded-full"></span>REA</h2><div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">{reas.map(p=><BedCard key={p.id} data={p} onClick={setSel}/>)}</div></div>}
           {ucins.length>0 && <div><h2 className="text-2xl font-black text-purple-900 mb-6 flex items-center gap-2"><span className="w-2 h-8 bg-purple-500 rounded-full"></span>UCIN</h2><div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">{ucins.map(p=><BedCard key={p.id} data={p} onClick={setSel}/>)}</div></div>}
           {sel && <Modal p={sel} onClose={()=>setSel(null)}/>}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
