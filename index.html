<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso UCI</title>
  <style>
    :root{
      /* Paleta de acento (fija en ambos temas) */
      --blue-50:#eff6ff; --blue-100:#dbeafe; --blue-500:#3b82f6; --blue-600:#2563eb; --blue-700:#1d4ed8; --blue-900:#1e3a8a;
      --purple-100:#f3e8ff; --purple-500:#a855f7; --purple-600:#9333ea; --purple-700:#7e22ce; --purple-900:#581c87;
      --red-50:#fef2f2; --red-100:#fee2e2; --red-200:#fecaca; --red-500:#ef4444; --red-600:#dc2626; --red-700:#b91c1c;
      --emerald-100:#d1fae5; --emerald-500:#10b981; --emerald-700:#047857;
      --amber-100:#fef3c7; --amber-200:#fde68a; --amber-500:#f59e0b; --amber-700:#b45309;
      --indigo-100:#e0e7ff; --indigo-600:#4f46e5;
      --sky-100:#e0f2fe; --sky-600:#0284c7;
      --rose-100:#ffe4e6; --rose-600:#e11d48;
      --lime-100:#ecfccb; --lime-600:#65a30d;

      /* Tokens semánticos — TEMA CLARO */
      --bg-page:#f0f4f8; --dot-grid:#cbd5e1;
      --surface:#ffffff; --surface-2:#f8fafc; --surface-3:#f1f5f9;
      --text-strong:#1e293b; --text:#334155; --text-muted:#64748b; --text-faint:#94a3b8;
      --border:#e2e8f0; --border-soft:#f1f5f9;
      --shadow:rgba(0,0,0,0.08); --shadow-lift:rgba(0,0,0,0.22);
    }
    [data-theme="dark"]{
      --bg-page:#0b1220; --dot-grid:#1e293b;
      --surface:#1e293b; --surface-2:#162033; --surface-3:#334155;
      --text-strong:#f1f5f9; --text:#cbd5e1; --text-muted:#94a3b8; --text-faint:#64748b;
      --border:#334155; --border-soft:#1e293b;
      --shadow:rgba(0,0,0,0.5); --shadow-lift:rgba(0,0,0,0.65);
    }

    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      background-color:var(--bg-page);
      background-image:radial-gradient(var(--dot-grid) 1px, transparent 1px);
      background-size:24px 24px;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      min-height:100vh;
      transition:background-color .3s, color .3s;
    }
    .hidden{display:none !important;}

    /* ---------- LOGIN ---------- */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
    .login-glass{
      background:var(--surface);
      border:1px solid var(--border);
      padding:40px;border-radius:24px;max-width:360px;width:100%;text-align:center;
      box-shadow:0 25px 50px -12px var(--shadow-lift);
    }
    .login-badge{
      display:inline-flex;padding:16px;background:var(--blue-600);border-radius:16px;color:#fff;margin-bottom:24px;
      box-shadow:0 10px 25px -5px rgba(59,130,246,0.4);
    }
    .login-glass h1{font-size:24px;font-weight:900;color:var(--text-strong);margin:0 0 8px;}
    .login-glass p.sub{color:var(--text-muted);font-size:14px;margin:0 0 32px;font-weight:500;}
    .login-input{
      width:100%;padding:12px 20px;border-radius:12px;background:var(--surface-2);
      border:1px solid var(--border);outline:none;font-weight:700;text-align:center;
      color:var(--text);font-size:15px;transition:all .15s;
    }
    .login-input::placeholder{color:var(--text-faint);}
    .login-input:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(59,130,246,0.25);}
    .login-btn{
      width:100%;margin-top:16px;background:var(--blue-600);color:#fff;font-weight:700;
      padding:12px;border:none;border-radius:12px;cursor:pointer;font-size:15px;
      box-shadow:0 10px 20px -5px rgba(37,99,235,0.4);transition:all .12s;
    }
    .login-btn:hover{background:var(--blue-700);}
    .login-btn:active{transform:scale(0.96);}
    .login-error{margin-top:16px;color:var(--red-500);font-size:12px;font-weight:700;}

    /* ---------- DASHBOARD ---------- */
    .dash{min-height:100vh;padding:24px;max-width:1920px;margin:0 auto;}
    @media(min-width:768px){.dash{padding:40px;}}
    .header{
      margin-bottom:24px;display:flex;flex-direction:column;justify-content:space-between;
      align-items:flex-end;gap:16px;
    }
    @media(min-width:768px){.header{flex-direction:row;}}
    .header .titles{width:100%;}
    .header h1{font-size:44px;font-weight:900;color:var(--text-strong);letter-spacing:-0.03em;margin:0 0 8px;line-height:1;}
    .header h1 span{color:var(--blue-600);}
    .header .tagline{color:var(--text-muted);font-weight:500;margin:0;}
    .header .tools{display:flex;gap:12px;align-items:center;}
    .chip-btn{
      background:var(--surface);color:var(--text-muted);padding:10px;border:1px solid var(--border);border-radius:12px;
      cursor:pointer;transition:all .15s;display:flex;box-shadow:0 1px 2px var(--shadow);
    }
    .chip-btn:hover{color:var(--text-strong);border-color:var(--text-faint);}
    .clock{
      background:var(--surface);padding:10px 16px;border-radius:12px;box-shadow:0 1px 2px var(--shadow);
      border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text-muted);white-space:nowrap;
      display:flex;align-items:center;gap:7px;
    }
    .clock .live{width:7px;height:7px;border-radius:50%;background:var(--emerald-500);display:inline-block;}
    .logout-btn{
      background:var(--red-50);color:var(--red-600);padding:10px;border:1px solid transparent;border-radius:12px;
      cursor:pointer;transition:background .15s;display:flex;
    }
    .logout-btn:hover{background:var(--red-100);}

    /* ---------- BARRA RESUMEN ---------- */
    .summary{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:36px;}
    .stat{
      display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);
      padding:10px 18px;border-radius:14px;box-shadow:0 1px 2px var(--shadow);
    }
    .stat .pip{width:10px;height:10px;border-radius:3px;flex:none;}
    .stat.rea .pip{background:var(--blue-500);}
    .stat.ucin .pip{background:var(--purple-500);}
    .stat .num{font-size:20px;font-weight:900;color:var(--text-strong);line-height:1;}
    .stat .lbl{font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;}
    .stat.sev{gap:8px;}
    .stat.sev .num{font-size:18px;}
    .stat.crit.has{background:var(--red-50);border-color:var(--red-200);}
    .stat.crit.has .num{color:var(--red-700);}
    .stat.crit.has .lbl{color:var(--red-600);}
    .stat.warn.has{background:var(--amber-100);border-color:var(--amber-200);}
    .stat.warn.has .num{color:var(--amber-700);}
    .stat.warn.has .lbl{color:var(--amber-700);}
    .crit-dot,.warn-dot{width:8px;height:8px;border-radius:50%;flex:none;}
    .crit-dot{background:var(--red-600);}
    .stat.crit.has .crit-dot{animation:pulse 1.2s ease-in-out infinite;}
    .warn-dot{background:var(--amber-500);}

    .unit-block{margin-bottom:48px;}
    .unit-title{font-size:24px;font-weight:900;margin:0 0 24px;display:flex;align-items:center;gap:8px;}
    .unit-title.rea{color:var(--blue-900);}
    .unit-title.ucin{color:var(--purple-900);}
    [data-theme="dark"] .unit-title.rea{color:#93c5fd;}
    [data-theme="dark"] .unit-title.ucin{color:#d8b4fe;}
    .unit-bar{width:8px;height:32px;border-radius:9999px;display:inline-block;}
    .unit-bar.rea{background:var(--blue-500);}
    .unit-bar.ucin{background:var(--purple-500);}

    .grid{display:grid;grid-template-columns:1fr;gap:24px;}
    @media(min-width:640px){.grid{grid-template-columns:repeat(2,1fr);}}
    @media(min-width:1024px){.grid{grid-template-columns:repeat(3,1fr);}}
    @media(min-width:1280px){.grid{grid-template-columns:repeat(4,1fr);}}
    @media(min-width:1536px){.grid{grid-template-columns:repeat(5,1fr);}}

    /* ---------- TARJETA ---------- */
    .card{
      position:relative;background:linear-gradient(145deg,var(--surface),var(--surface-2));
      border-radius:12px;box-shadow:0 1px 2px var(--shadow);padding:20px;cursor:pointer;
      border:1px solid var(--border);border-left-width:4px;transition:box-shadow .18s, transform .18s;
      animation:fadeUp .4s ease both;
    }
    .card:hover{box-shadow:0 25px 50px -12px var(--shadow-lift);transform:translateY(-4px);}
    .card.st-critico{border-left-color:var(--red-500);}
    .card.st-estable{border-left-color:var(--emerald-500);}
    .card.st-alerta{border-left-color:var(--amber-500);}
    .card.is-critico{border-left-width:6px;box-shadow:0 0 0 1px rgba(239,68,68,0.18),0 1px 2px var(--shadow);}

    /* Camas vacías: atenuadas y con borde discontinuo */
    .card.empty{
      opacity:0.5;border-style:dashed;border-left-style:dashed;
      border-color:var(--border);border-left-color:var(--border);
      background:var(--surface-2);box-shadow:none;
    }
    .card.empty:hover{opacity:0.85;transform:none;box-shadow:0 1px 2px var(--shadow);}
    .card.empty .bed-ico{background:transparent;}
    .card.empty .card-name{color:var(--text-faint);font-size:18px;font-weight:800;}

    .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .card-bed{display:flex;align-items:center;gap:12px;}
    .bed-ico{background:var(--surface-3);padding:8px;border-radius:8px;color:var(--text-faint);display:flex;}
    .card h3{font-size:20px;font-weight:900;color:var(--text-strong);line-height:1;margin:0;}
    .unit-badge{font-size:10px;font-weight:900;padding:1px 8px;border-radius:4px;text-transform:uppercase;display:inline-block;margin-top:2px;}
    .unit-badge.rea{background:var(--blue-100);color:var(--blue-700);}
    .unit-badge.ucin{background:var(--purple-100);color:var(--purple-700);}

    .status-badge{padding:4px 8px;border-radius:4px;font-size:12px;font-weight:700;text-transform:uppercase;display:inline-flex;align-items:center;}
    .status-badge .crit-dot{margin-right:5px;animation:pulse 1.2s ease-in-out infinite;}
    .status-badge.st-critico{background:var(--red-100);color:var(--red-700);}
    .status-badge.st-estable{background:var(--emerald-100);color:var(--emerald-700);}
    .status-badge.st-alerta{background:var(--amber-100);color:var(--amber-700);}

    .card-meta{
      display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--text-muted);
      margin-bottom:12px;background:var(--surface-2);padding:6px;border-radius:8px;border:1px solid var(--border-soft);
    }
    .card-meta .chip{display:flex;align-items:center;gap:4px;}
    .card-meta .divider{color:var(--text-faint);}
    .card-meta-empty{margin-bottom:12px;height:34px;}

    .card-label{font-size:12px;color:var(--text-faint);font-weight:700;text-transform:uppercase;margin:0;}
    .card-name{font-size:24px;font-weight:900;color:var(--text);margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* Mini-indicadores de sistemas */
    .sys-dots{display:flex;gap:7px;margin-top:14px;align-items:center;}
    .sys-dots .dot{width:9px;height:9px;border-radius:50%;background:var(--border);transition:transform .15s;}
    .sys-dots .dot.on{box-shadow:0 0 0 2px var(--surface), 0 0 0 3px transparent;}
    .dot.neuro.on{background:var(--indigo-600);}
    .dot.resp.on{background:var(--sky-600);}
    .dot.hemo.on{background:var(--rose-600);}
    .dot.renal.on{background:var(--amber-700);}
    .dot.infec.on{background:var(--purple-600);}
    .dot.diges.on{background:var(--lime-600);}

    /* ---------- MODAL ---------- */
    .modal-backdrop{
      position:fixed;inset:0;background-color:rgba(2,6,23,0.8);backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;padding:16px;z-index:50;
      animation:fadeIn .2s ease;
    }
    .modal{
      background:var(--surface-2);width:100%;max-width:1152px;max-height:95vh;overflow-y:auto;
      border-radius:24px;box-shadow:0 25px 50px -12px var(--shadow-lift);border:1px solid var(--border);
    }
    .modal-head{
      background:var(--surface);padding:24px;border-bottom:1px solid var(--border);display:flex;
      justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;
      box-shadow:0 1px 2px var(--shadow);
    }
    .modal-head-left{display:flex;align-items:center;gap:16px;}
    .modal-bednum{
      height:56px;width:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;
      color:#fff;font-weight:900;font-size:24px;box-shadow:0 4px 6px rgba(0,0,0,0.1);
    }
    .modal-bednum.rea{background:var(--blue-600);}
    .modal-bednum.ucin{background:var(--purple-600);}
    .modal-head h2{font-size:28px;font-weight:900;color:var(--text-strong);letter-spacing:-0.02em;margin:0;}
    .modal-head-meta{display:flex;align-items:center;gap:12px;color:var(--text-muted);font-weight:700;font-size:14px;margin-top:4px;}
    .modal-head-meta .pill{background:var(--surface-3);padding:1px 8px;border-radius:4px;color:var(--text);}
    .modal-close{
      padding:10px 20px;background:var(--surface-3);border:none;border-radius:12px;font-weight:700;
      color:var(--text-muted);cursor:pointer;transition:background .15s;
    }
    .modal-close:hover{background:var(--border);}
    .modal-body{padding:24px;display:flex;flex-direction:column;gap:24px;}
    @media(min-width:768px){.modal-body{padding:32px;}}

    .dx-box{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--blue-500);padding:18px 20px;border-radius:16px;display:flex;gap:14px;align-items:flex-start;box-shadow:0 1px 2px var(--shadow);}
    .dx-box.ucin{border-left-color:var(--purple-500);}
    .dx-ico{flex:none;padding:10px;border-radius:10px;display:flex;background:var(--blue-100);color:var(--blue-700);}
    .dx-box.ucin .dx-ico{background:var(--purple-100);color:var(--purple-700);}
    .dx-box .dx-txt{flex:1;}
    .dx-box h3{font-size:12px;font-weight:900;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.1em;margin:0 0 4px;}
    .dx-box p{font-size:18px;font-weight:700;color:var(--text-strong);margin:0;line-height:1.4;}

    .ap-box{background:var(--surface-3);padding:20px;border-radius:16px;border:1px solid var(--border);}
    .ap-box h3{font-size:12px;font-weight:900;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px;}
    .ap-box p{font-size:16px;font-weight:500;color:var(--text);font-style:italic;margin:0;}

    .plan-wrap{padding:4px;border-radius:16px;box-shadow:0 1px 2px var(--shadow);}
    .plan-wrap.rea{background:linear-gradient(to right,var(--blue-500),#60a5fa);}
    .plan-wrap.ucin{background:linear-gradient(to right,var(--purple-500),#c084fc);}
    .plan-inner{background:var(--surface);padding:20px;border-radius:12px;}
    .plan-head{display:flex;gap:8px;align-items:center;color:var(--text-strong);margin-bottom:8px;font-weight:900;text-transform:uppercase;letter-spacing:0.02em;}
    .plan-inner p{font-size:18px;font-weight:500;padding-left:32px;line-height:1.6;color:var(--text-strong);margin:0;}

    .sys-grid{display:grid;grid-template-columns:1fr;gap:20px;}
    @media(min-width:768px){.sys-grid{grid-template-columns:repeat(3,1fr);}}
    .sys{background:var(--surface);padding:16px;border-radius:16px;border:1px solid var(--border);box-shadow:0 1px 2px var(--shadow);}
    .sys-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .sys-ico{padding:8px;border-radius:8px;display:flex;}
    .sys-ico.neuro{background:var(--indigo-100);color:var(--indigo-600);}
    .sys-ico.resp{background:var(--sky-100);color:var(--sky-600);}
    .sys-ico.hemo{background:var(--rose-100);color:var(--rose-600);}
    .sys-ico.renal{background:var(--amber-100);color:var(--amber-700);}
    .sys-ico.infec{background:var(--purple-100);color:var(--purple-600);}
    .sys-ico.diges{background:var(--lime-100);color:var(--lime-600);}
    .sys h4{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin:0;}
    .sys p{font-size:14px;font-weight:500;color:var(--text);padding-left:40px;line-height:1.6;margin:0;}

    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

    @media (prefers-reduced-motion: reduce){
      .card,.modal-backdrop{animation:none;}
      .crit-dot,.status-badge .crit-dot{animation:none;}
      .card:hover{transform:none;}
    }

    :focus-visible{outline:2px solid var(--blue-500);outline-offset:2px;}
    ::-webkit-scrollbar{width:8px;}
    ::-webkit-scrollbar-thumb{background:var(--text-faint);border-radius:4px;}
  </style>
</head>

    // ---------- UTILIDADES ----------
    function esc(s){
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function statusClass(estado){
      if(estado === 'Crítico') return 'st-critico';
      if(estado === 'Alerta')  return 'st-alerta';
      return 'st-estable';
    }
    function estaOcupada(p){ return p.paciente_id !== 'Cama Vacía'; }
    function nombreMostrar(p){ return estaOcupada(p) ? 'Cama Ocupada' : 'Cama Vacía'; }

    const SISTEMAS = [
      {key:'neurologico', cls:'neuro', label:'Neurológico'},
      {key:'respiratorio', cls:'resp', label:'Respiratorio'},
      {key:'hemodinamico', cls:'hemo', label:'Hemodinámico'},
      {key:'renal', cls:'renal', label:'Renal'},
      {key:'infeccioso', cls:'infec', label:'Infeccioso'},
      {key:'digestivo', cls:'diges', label:'Digestivo'}
    ];
    function sysDotsHTML(p){
      const s = p.sistemas || {};
      let dots = '';
      for(let i=0;i<SISTEMAS.length;i++){
        const sy = SISTEMAS[i];
        const val = s[sy.key];
        const on = val && String(val).trim() !== '';
        const tip = sy.label + (on ? ': ' + String(val) : ': sin datos');
        dots += '<span class="dot '+sy.cls+(on?' on':'')+'" title="'+esc(tip)+'"></span>';
      }
      return '<div class="sys-dots">'+dots+'</div>';
    }

    function desdeTexto(ts){
      const min = Math.floor((Date.now() - ts) / 60000);
      if(min < 1) return 'actualizado hace un momento';
      if(min === 1) return 'actualizado hace 1 min';
      if(min < 60) return 'actualizado hace ' + min + ' min';
      const h = Math.floor(min/60);
      return 'actualizado hace ' + h + ' h';
    }

      const pw = document.getElementById('pw');

      function submit(){
        if(pw.value.toLowerCase() === PASSWORD_CORRECTA.toLowerCase()){

    function sysHTML(cls, name, label, txt){
      return '<div class="sys"><div class="sys-head"><div class="sys-ico '+cls+'">'+icon(name,20)+'</div>'+
        '<h4>'+esc(label)+'</h4></div><p>'+(txt ? esc(txt) : 'Sin datos.')+'</p></div>';
    }
    function openModal(p){
      const unitLow = p.unidad === 'UCIN' ? 'ucin' : 'rea';
      const s = p.sistemas || {};
      const dx = (p.diagnostico && p.diagnostico !== '?')
        ? '<div class="dx-box '+unitLow+'"><div class="dx-ico">'+icon('Stethoscope',22)+'</div><div class="dx-txt"><h3>Diagnóstico</h3><p>'+esc(p.diagnostico)+'</p></div></div>'
        : '';
      const ap = (p.antecedentes && p.antecedentes !== '?')
        ? '<div class="ap-box"><h3>Antecedentes Personales (AP)</h3><p>'+esc(p.antecedentes)+'</p></div>'
        : '';
      const modal = document.createElement('div');
      modal.className = 'modal-backdrop';
      modal.innerHTML =
        '<div class="modal">'+
          '<div class="modal-head"><div class="modal-head-left">'+
            '<div class="modal-bednum '+unitLow+'">'+esc(p.numero_cama)+'</div>'+
            '<div><h2>'+esc(nombreMostrar(p))+'</h2><div class="modal-head-meta">'+
              '<span class="pill">'+esc(p.sexo)+'</span><span>'+esc(p.edad)+' años</span>'+
              '<span style="color:var(--text-faint);">•</span><span>Estancia: Día '+esc(p.dias_estancia)+'</span>'+
            '</div></div></div>'+
            '<button class="modal-close">Cerrar</button>'+
          '</div>'+
          '<div class="modal-body">'+
            dx+
            ap+
            '<div class="plan-wrap '+unitLow+'"><div class="plan-inner">'+
              '<div class="plan-head">'+icon('Clipboard',24)+'<span>Plan Terapéutico</span></div>'+
              '<p>'+esc(p.plan)+'</p></div></div>'+
            '<div class="sys-grid">'+
              sysHTML('neuro','Brain','Neurológico',s.neurologico)+
              sysHTML('resp','Wind','Respiratorio',s.respiratorio)+
              sysHTML('hemo','Heart','Hemodinámico',s.hemodinamico)+
              sysHTML('renal','Droplet','Renal',s.renal)+
              sysHTML('infec','Thermometer','Infeccioso',s.infeccioso)+
              sysHTML('diges','Stomach','Digestivo',s.digestivo)+
            '</div>'+
          '</div>'+
        '</div>';
      function close(){
        if(modal.parentNode) modal.parentNode.removeChild(modal);
        document.removeEventListener('keydown', onKey);
      }
      function onKey(e){ if(e.key === 'Escape') close(); }
      modal.addEventListener('click', close);
      modal.querySelector('.modal').addEventListener('click', function(e){ e.stopPropagation(); });
      modal.querySelector('.modal-close').addEventListener('click', close);
      document.addEventListener('keydown', onKey);
      document.body.appendChild(modal);
    }

    // ---------- ACTUALIZAR "hace X min" cada 30 s ----------
    setInterval(function(){
      const el = document.getElementById('freshness');
      if(el) el.textContent = desdeTexto(GENERADO);
    }, 30000);

    // ---------- ARRANQUE ----------
    let logged = false;
    try{ logged = sessionStorage.getItem('uci_auth') === 'true'; }catch(e){}
    if(logged) renderDashboard(); else renderLogin();
  </script>
</body>
</html>
